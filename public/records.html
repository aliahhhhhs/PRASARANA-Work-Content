<!doctype html>
<html>
  <head>
    <title>Records</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="records-container" style="position: relative">
      <h2 style="font-family: Tahoma; font-size: 30px">Work Content Records</h2>

      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          width: 100%;
          margin-bottom: 20px;
          flex-wrap: wrap;
          gap: 10px;
        "
      ></div>

      <div
        style="
          display: flex;
          gap: 8px;
          align-items: center;
          flex-wrap: wrap;
          width: 100%;
        "
      >
        <input type="text" id="search" placeholder="Search..." />

        <select id="filterTeam">
          <option value="">All Teams</option>
          <option value="Team 1">TEAM 1</option>
          <option value="Team 2">TEAM 2</option>
        </select>

        <div class="train-selector-container">
            <button type="button" id="trainBtn" onclick="toggleTrainDropdown(event)" style="padding: 8px 12px; background: white; border: 1px solid #ccc; border-radius: 6px; cursor: pointer;">Select Train ID</button>
            <div id="trainDropdown" style="display: none; position: absolute; z-index: 100; background: white; border: 1px solid #ccc; box-shadow: 0px 4px 8px rgba(0,0,0,0.15); width: 250px; max-height: 200px; overflow-y: auto; padding: 12px; border-radius: 8px;">
              <div id="trainGrid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;"></div>
            </div>
          </div>

        <select id="filterItem">
          <option value="">All Items</option>
        </select>

        <input
          type="text"
          id="filterDateRange"
          placeholder="Select Date Range..."
          style="width: 220px"
        />

        <button
          id="clearDataBtn"
          style="
            background: #666;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            margin-left: 5px;
            border: none;
            cursor: pointer;
          "
        >
          Clear
        </button>

        <select id="filterPIC">
          <option value="">All PIC</option>
        </select>

        <div style="display: flex; gap: 10px; align-items: center;"></div>

        <button id="adminNotiBtn" onclick="toggleNotiDropdown(event)" style="display: none; background: #ff9800; color: white; padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; position: relative;">
            🔔 Notifications <span id="notiCount" style="background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 11px; margin-left: 5px; display:none;">0</span>
          </button>
        
          <button
            onclick="loadRecords()"
            style="
              background: #c8102e;
              color: white;
              padding: 12px 20px;
              border-radius: 8px;
              border: none;
              cursor: pointer;
              font-weight: bold;
            "
          >
            Refresh
          </button>

          <button
        onclick="exportToExcel()"
        style="
          background: #1f7244;
          color: white;
          padding: 12px 20px;
          border-radius: 8px;
          border: none;
          cursor: pointer;
          font-weight: bold;
        "
      >
        Export to Excel
      </button>

          <a
            href="Dashboard.html"
            style="
              display: inline-block;
              text-decoration: none;
              background: #c8102e;
              color: white;
              padding: 12px 20px;
              border-radius: 8px;
              font-weight: bold;
            "
          >
            Back to Dashboard
          </a>
        </div>
      </div>

      <!-- Dropdown Paparan Notifikasi Mesej Admin -->
      <div id="notiDropdownMenu" class="noti-dropdown">
        <h4 style="margin: 0 0 10px 0; border-bottom: 1px solid #ccc; padding-bottom: 5px;">Edit Requests from Users</h4>
        <div id="notiItemsContainer">Tada notifikasi baharu.</div>
      </div>

      <!-- Paparan Pilihan Train ID Aktif (Di bawah filter) -->
      <div id="selectedTrainsContainer" style="display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 15px;"></div>

      <!-- Keperluan 2: Chatbox Minta Edit Sebelum Table (Untuk kegunaan Users) -->
      <div id="userChatboxContainer" style="background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #cbd5e1;">
        <h4 style="margin: 0 0 8px 0; color: #334155;">Request Record Edit (Chatbox Admin Notification)</h4>
        <div style="display: flex; gap: 10px;">
          <input type="number" id="chatRecordId" placeholder="Row ID (e.g. 1)" style="width: 100px; padding: 8px; border-radius: 6px; border: 1px solid #ccc;" />
          <input type="text" id="chatMessage" placeholder="Nyatakan apa yang tersalah & ingin diubah..." style="flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #ccc;" />
          <button onclick="submitEditRequest()" style="background: #c8102e; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold;">Submit Request</button>
        </div>
      </div>

      <div
        style="
          font-family: Tahoma;
          font-size: 16px;
          font-weight: bold;
          margin-bottom: 10px;
          color: #333;
        "
      >
        Total Records:
        <span id="totalRecordsCount">0</span>
      </div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Team</th>
            <th>Task</th>
            <th>Date</th>
            <th>Item</th>
            <th>Serial</th>
            <th>Train ID</th>
            <th>PIC</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- Popup Edit Record -->
    <div id="editModal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); justify-content: center; align-items: center;">
    <div style="background-color: white; padding: 25px; border-radius: 12px; width: 450px; box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.25); font-family: Tahoma, sans-serif;">
    <h3 style="margin-top: 0; text-align: center; border-bottom: 2px solid #ccc; padding-bottom: 10px;">Edit Record</h3>

    <input type="hidden" id="editRecordId" />
    <input type="hidden" id="editRecordTeam" /> <!-- Menyimpan team asal untuk filter PIC -->

    <table style="width: 100%; border-collapse: collapse">
      <tr style="border-bottom: 1px solid #eee">
        <td style="padding: 10px 0; font-weight: bold; width: 35%">Task</td>
        <td style="padding: 10px 0"><input type="text" id="editTask" style="width: 100%; padding: 6px; box-sizing: border-box" /></td>
      </tr>

      <tr style="border-bottom: 1px solid #eee">
        <td style="padding: 10px 0; font-weight: bold">Date</td>
        <td style="padding: 10px 0"><input type="date" id="editDate" style="width: 100%; padding: 6px; box-sizing: border-box" /></td>
      </tr>

      <tr style="border-bottom: 1px solid #eee">
        <td style="padding: 10px 0; font-weight: bold">Item</td>
        <td style="padding: 10px 0"><input type="text" id="editItem" style="width: 100%; padding: 6px; box-sizing: border-box" /></td>
      </tr>

      <tr style="border-bottom: 1px solid #eee">
        <td style="padding: 10px 0; font-weight: bold">Serial Number</td>
        <td style="padding: 10px 0"><input type="text" id="editSerial" style="width: 100%; padding: 6px; box-sizing: border-box" /></td>
      </tr>

      <tr style="border-bottom: 1px solid #eee">
        <td style="padding: 10px 0; font-weight: bold">Train ID(s)</td>
        <td style="padding: 10px 0">
          <div class="edit-train-container" style="position: relative; width: 100%;">
            <button type="button" id="editTrainBtn" onclick="toggleEditTrainDropdown(event)" style="width: 100%; padding: 6px; text-align: left; background: white; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;">Select Train ID</button>
              <div id="editTrainDropdown" style="display: none; position: absolute; z-index: 1100; background: white; border: 1px solid #ccc; box-shadow: 0px 4px 8px rgba(0,0,0,0.15); width: 100%; max-height: 150px; overflow-y: auto; padding: 10px; box-sizing: border-box;">
              <div id="editTrainGrid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;"></div>
            </div>
            </div>
          <div id="editSelectedTrainsContainer" style="display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; min-height: 20px;"></div>
        </td>
      </tr>

      <tr style="border-bottom: 1px solid #eee">
        <td style="padding: 10px 0; font-weight: bold">Person in Charge</td>
        <td style="padding: 10px 0">
          <select id="editPic" style="width: 100%; padding: 6px; box-sizing: border-box;">
            <option value="">Select PIC</option>
          </select>
        </td>
      </tr>
    </table>

        <div style="display: flex; justify-content: space-between; margin-top: 20px;">
          <button onclick="closeEditModal()" style="background: white; border: 2px solid #c8102e; color: #c8102e; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">Cancel</button>
          <button onclick="saveEditedRecord()" style="background: #c8102e; border: none; color: white; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">Done</button>
    </div>
  </div>
</div>

      
    

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <script src="js/records.js"></script>
  </body>
</html>
