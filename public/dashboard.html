<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>

  <body>
    <div class="sidebar">
      <h2>PRASARANA</h2>
      <a href="dashboard.html">Dashboard</a>
      <a href="records.html">Records</a>
      <a href="index.html">Logout</a>
    </div>

    <div class="main">
      <div class="header">
        <h1>Dashboard</h1>
        <h3 id="teamName"></h3>
      </div>

      <!-- Gantikan bahagian <div class="cards"> asal -->
    <div class="cards" style="display: flex; gap: 20px;">
      <div class="card">
        <h2>Total Task (This Week)</h2>
        <p id="totalWeek">0</p>
      </div>
      <div class="card">
        <h2>Total Task (This Month)</h2>
        <p id="totalMonth">0</p>
      </div>
    </div>

      <form class="form-card" id="workContentForm">
        <h2>Work Content</h2>

        <label>Task</label>
        <input type="text" id="task" />

        <label>Date</label>
        <input type="date" id="date" />

        <label>Items</label>
        <input list="itemsList" id="itemInput" />
        <datalist id="itemsList"></datalist>

        <label>Serial Number</label>
        <input type="text" id="serial" />

        <label>Train ID</label>
        <div class="train-selector-container" style="position: relative; width: 100%; margin-bottom: 15px;">
          <button type="button" id="trainBtn" onclick="toggleTrainDropdown(event)" style="width: 100%; padding: 12px; text-align: left; background: white; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 16px;">Select Train ID</button>
          <div id="trainDropdown" style="display: none; position: absolute; z-index: 100; background: white; border: 1px solid #ccc; box-shadow: 0px 4px 8px rgba(0,0,0,0.15); width: 100%; max-height: 200px; overflow-y: auto; padding: 12px; border-radius: 8px; box-sizing: border-box;">
            <div id="trainGrid" style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px;">
            </div>
          </div>
        </div>

        <div id="selectedTrainsContainer" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; min-height: 20px;">
        </div>

        <label>Person In Charge</label>
        <select id="pic">
          <option value="PIC">All</option>
        </select>

        <br /><br />
        <button
          onclick="submitWorkAndRefresh(event)"
          style="
            background: #c8102e;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
          "
        >
          SAVE DATA
        </button>
      </form>

    <script src="js/dashboard.js"></script>
  </body>
</html>
